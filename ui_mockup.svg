<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 850 1900" width="850" height="1900">
  <defs>
    <filter id="shadow" x="-20" y="-20" width="200" height="200">
      <feDropShadow dx="0" dy="25" stdDeviation="35" flood-color="#000" flood-opacity="0.18"/>
    </filter>
    <filter id="card-shadow">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.06"/>
    </filter>
    <linearGradient id="screen-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F8FAFB"/>
      <stop offset="100%" stop-color="#EDF1F5"/>
    </linearGradient>
  </defs>

  <!-- Phone Frame -->
  <rect x="30" y="30" width="370" height="800" rx="45" ry="45" fill="#1A1A1A" filter="url(#shadow)"/>
  <rect x="37" y="37" width="356" height="786" rx="38" ry="38" fill="url(#screen-bg)"/>

  <!-- Dynamic Island / Notch area -->
  <rect x="165" y="47" width="100" height="30" rx="15" ry="15" fill="#000"/>

  <!-- App content area -->
  <svg x="37" y="77" width="356" height="686" viewBox="0 0 356 686">

    <!-- Top Bar -->
    <rect x="0" y="0" width="356" height="64" fill="#1976D2"/>
    <text x="24" y="40" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="20" font-weight="700" fill="white">WebhookSender</text>
    <circle cx="310" cy="32" r="20" fill="rgba(255,255,255,0.2)"/>
    <text x="310" y="38" font-family="Segoe UI Emoji" font-size="16" text-anchor="middle" fill="white">⚙</text>

    <!-- Settings indicator strip -->
    <rect x="16" y="80" width="324" height="48" rx="12" fill="#E3F2FD"/>
    <circle cx="40" cy="104" r="8" fill="#1976D2"/>
    <text x="36" y="108" font-family="Segoe UI Emoji" font-size="10" text-anchor="middle" fill="white">✓</text>
    <text x="60" y="108" font-family="'Segoe UI', sans-serif" font-size="14" fill="#1976D2" font-weight="500">Webhook已配置</text>

    <!-- Keyword Input -->
    <rect x="16" y="148" width="324" height="56" rx="12" fill="white" stroke="#E0E0E0" stroke-width="1.5"/>
    <text x="34" y="182" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="16" fill="#333">警告</text>
    <text x="34" y="165" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="10" fill="#888">关键字</text>

    <!-- Content Input -->
    <rect x="16" y="224" width="324" height="140" rx="12" fill="white" stroke="#E0E0E0" stroke-width="1.5"/>
    <text x="34" y="246" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="10" fill="#888">正文</text>
    <text x="34" y="274" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="16" fill="#333">服务器CPU使用率达到</text>
    <text x="34" y="296" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="16" fill="#333">95%，请立即检查处理。</text>

    <!-- Send Button -->
    <rect x="16" y="388" width="324" height="56" rx="14" fill="#1976D2"/>
    <text x="178" y="420" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="17" font-weight="600" text-anchor="middle" fill="white">📤 发 送</text>

    <!-- Success Banner -->
    <rect x="16" y="464" width="324" height="48" rx="10" fill="#E8F5E9" stroke="#A5D6A7" stroke-width="1"/>
    <text x="178" y="494" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="15" text-anchor="middle" fill="#2E7D32" font-weight="500">✅ 发送成功！HTTP 200</text>

    <!-- Recent History section -->
    <text x="16" y="548" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="14" font-weight="700" fill="#555">最近发送</text>

    <!-- History Card 1 (Success) -->
    <g transform="translate(16 562)" filter="url(#card-shadow)">
      <rect width="324" height="78" rx="12" fill="white"/>
      <rect x="0" y="0" width="4" height="78" rx="2" fill="#4CAF50"/>
      <text x="16" y="24" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="16" font-weight="700" fill="#222">警告</text>
      <text x="16" y="46" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="13" fill="#555">服务器CPU使用率达到95%，请...</text>
      <text x="300" y="22" font-family="'Segoe UI', sans-serif" font-size="10" fill="#999" text-anchor="end">14:32:05</text>
      <rect x="16" y="56" width="48" height="20" rx="10" fill="#E8F5E9"/>
      <text x="40" y="70" font-family="'Segoe UI', sans-serif" font-size="10" text-anchor="middle" fill="#2E7D32" font-weight="600">✓ 成功</text>
    </g>

    <!-- History Card 2 (Failed) -->
    <g transform="translate(16 652)" filter="url(#card-shadow)">
      <rect width="324" height="78" rx="12" fill="white"/>
      <rect x="0" y="0" width="4" height="78" rx="2" fill="#E53935"/>
      <text x="16" y="24" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="16" font-weight="700" fill="#222">报错</text>
      <text x="16" y="46" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="13" fill="#555">数据库连接超时，服务不可用</text>
      <text x="300" y="22" font-family="'Segoe UI', sans-serif" font-size="10" fill="#999" text-anchor="end">10:15:22</text>
      <rect x="16" y="56" width="92" height="20" rx="10" fill="#FFEBEE"/>
      <text x="62" y="70" font-family="'Segoe UI', sans-serif" font-size="10" text-anchor="middle" fill="#C62828" font-weight="600">✗ 网络错误</text>
    </g>
  </svg>

  <!-- Bottom Nav Bar -->
  <rect x="37" y="763" width="356" height="60" rx="0" fill="white"/>
  <line x1="37" y1="763" x2="393" y2="763" stroke="#EEE" stroke-width="1"/>
  <rect x="80" y="773" width="84" height="38" rx="19" fill="#1976D2" opacity="0.12"/>
  <text x="122" y="798" font-family="Segoe UI Emoji" font-size="16" text-anchor="middle" fill="#1976D2">📤 发送</text>
  <text x="278" y="797" font-family="Segoe UI Emoji" font-size="14" text-anchor="middle" fill="#888">📜 历史</text>

  <!-- Bottom app bar safe area -->
  <rect x="37" y="791" width="356" height="32" rx="0" fill="white"/>

  <!-- === SECOND PHONE === -->
  <!-- Phone Frame -->
  <rect x="450" y="30" width="370" height="800" rx="45" ry="45" fill="#1A1A1A" filter="url(#shadow)"/>
  <rect x="457" y="37" width="356" height="786" rx="38" ry="38" fill="url(#screen-bg)"/>

  <!-- Dynamic Island / Notch area -->
  <rect x="585" y="47" width="100" height="30" rx="15" ry="15" fill="#000"/>

  <!-- App content area -->
  <svg x="457" y="77" width="356" height="686" viewBox="0 0 356 686">
    <!-- Top Bar -->
    <rect x="0" y="0" width="356" height="64" fill="#1976D2"/>
    <text x="24" y="40" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="20" font-weight="700" fill="white">发送历史</text>
    <circle cx="310" cy="32" r="20" fill="rgba(255,255,255,0.2)"/>
    <text x="310" y="38" font-family="Segoe UI Emoji" font-size="16" text-anchor="middle" fill="white">⚙</text>

    <!-- History Card 1 -->
    <g transform="translate(16 16)" filter="url(#card-shadow)">
      <rect width="324" height="92" rx="12" fill="white"/>
      <rect x="0" y="0" width="4" height="92" rx="2" fill="#4CAF50"/>
      <text x="16" y="22" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="15" font-weight="700" fill="#222">警告</text>
      <text x="16" y="44" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="13" fill="#555" font-weight="500">服务器CPU使用率达到95%，请立即检查处理。</text>
      <text x="300" y="20" font-family="'Segoe UI', sans-serif" font-size="10" fill="#999" text-anchor="end">2025-06-08 14:32:05</text>
      <rect x="16" y="60" width="56" height="20" rx="10" fill="#E8F5E9"/>
      <text x="44" y="74" font-family="'Segoe UI', sans-serif" font-size="10" text-anchor="middle" fill="#2E7D32" font-weight="600">✓ 发送成功</text>
    </g>

    <!-- History Card 2 -->
    <g transform="translate(16 120)" filter="url(#card-shadow)">
      <rect width="324" height="92" rx="12" fill="white"/>
      <rect x="0" y="0" width="4" height="92" rx="2" fill="#E53935"/>
      <text x="16" y="22" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="15" font-weight="700" fill="#222">报错</text>
      <text x="16" y="44" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="13" fill="#555" font-weight="500">数据库连接超时，服务不可用</text>
      <text x="300" y="20" font-family="'Segoe UI', sans-serif" font-size="10" fill="#999" text-anchor="end">2025-06-08 10:15:22</text>
      <rect x="16" y="60" width="100" height="20" rx="10" fill="#FFEBEE"/>
      <text x="66" y="74" font-family="'Segoe UI', sans-serif" font-size="10" text-anchor="middle" fill="#C62828" font-weight="600">✗ 网络错误</text>
    </g>

    <!-- History Card 3 -->
    <g transform="translate(16 224)" filter="url(#card-shadow)">
      <rect width="324" height="92" rx="12" fill="white"/>
      <rect x="0" y="0" width="4" height="92" rx="2" fill="#4CAF50"/>
      <text x="16" y="22" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="15" font-weight="700" fill="#222">通知</text>
      <text x="16" y="44" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="13" fill="#555" font-weight="500">每日备份任务已完成，耗时12分钟。</text>
      <text x="300" y="20" font-family="'Segoe UI', sans-serif" font-size="10" fill="#999" text-anchor="end">2025-06-08 09:00:00</text>
      <rect x="16" y="60" width="56" height="20" rx="10" fill="#E8F5E9"/>
      <text x="44" y="74" font-family="'Segoe UI', sans-serif" font-size="10" text-anchor="middle" fill="#2E7D32" font-weight="600">✓ 发送成功</text>
    </g>

    <!-- History Card 4 -->
    <g transform="translate(16 328)" filter="url(#card-shadow)">
      <rect width="324" height="92" rx="12" fill="white"/>
      <rect x="0" y="0" width="4" height="92" rx="2" fill="#4CAF50"/>
      <text x="16" y="22" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="15" font-weight="700" fill="#222">新工单</text>
      <text x="16" y="44" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="13" fill="#555" font-weight="500">工单 #1024 已分配给您，请查看。</text>
      <text x="300" y="20" font-family="'Segoe UI', sans-serif" font-size="10" fill="#999" text-anchor="end">2025-06-07 18:45:33</text>
      <rect x="16" y="60" width="56" height="20" rx="10" fill="#E8F5E9"/>
      <text x="44" y="74" font-family="'Segoe UI', sans-serif" font-size="10" text-anchor="middle" fill="#2E7D32" font-weight="600">✓ 发送成功</text>
    </g>
  </svg>

  <!-- Bottom Nav Bar -->
  <rect x="457" y="763" width="356" height="60" rx="0" fill="white"/>
  <line x1="457" y1="763" x2="813" y2="763" stroke="#EEE" stroke-width="1"/>
  <text x="540" y="797" font-family="Segoe UI Emoji" font-size="14" text-anchor="middle" fill="#888">📤 发送</text>
  <rect x="630" y="773" width="84" height="38" rx="19" fill="#1976D2" opacity="0.12"/>
  <text x="672" y="798" font-family="Segoe UI Emoji" font-size="16" text-anchor="middle" fill="#1976D2">📜 历史</text>

  <!-- Bottom app bar safe area -->
  <rect x="457" y="791" width="356" height="32" rx="0" fill="white"/>

  <!-- === THIRD PHONE (Settings) === -->
  <rect x="30" y="1000" width="370" height="800" rx="45" ry="45" fill="#1A1A1A" filter="url(#shadow)"/>
  <rect x="37" y="1007" width="356" height="786" rx="38" ry="38" fill="url(#screen-bg)"/>

  <!-- Dynamic Island / Notch area -->
  <rect x="165" y="1017" width="100" height="30" rx="15" ry="15" fill="#000"/>

  <svg x="37" y="1047" width="356" height="686" viewBox="0 0 356 686">
    <!-- Top Bar -->
    <rect x="0" y="0" width="356" height="64" fill="#1976D2"/>
    <text x="24" y="40" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="20" font-weight="700" fill="white">⚙ 设置</text>

    <!-- Settings Card -->
    <rect x="16" y="80" width="324" height="180" rx="14" fill="white" filter="url(#card-shadow)"/>
    <text x="22" y="104" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="11" font-weight="600" fill="#888" letter-spacing="0.8">Webhook 配置</text>
    <line x1="16" y1="114" x2="340" y2="114" stroke="#F0F0F0" stroke-width="1"/>

    <text x="22" y="140" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="14" font-weight="500" fill="#444">Webhook 地址</text>
    <rect x="22" y="150" width="312" height="44" rx="8" fill="white" stroke="#E0E0E0" stroke-width="1.5"/>
    <text x="34" y="176" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="13" fill="#333">https://qyapi.weixin.qq.com/cgi-bin/...</text>
    <text x="22" y="210" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="11" fill="#999">请填写要接收消息的目标 Webhook URL</text>

    <!-- About Card -->
    <rect x="16" y="280" width="324" height="120" rx="14" fill="white" filter="url(#card-shadow)"/>
    <text x="22" y="304" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="11" font-weight="600" fill="#888" letter-spacing="0.8">关于</text>
    <line x1="16" y1="314" x2="340" y2="314" stroke="#F0F0F0" stroke-width="1"/>
    <text x="22" y="344" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="15" fill="#333">版本</text>
    <text x="320" y="344" font-family="'Segoe UI', sans-serif" font-size="14" fill="#888" text-anchor="end">1.0.0</text>
    <line x1="22" y1="358" x2="334" y2="358" stroke="#F8F8F8" stroke-width="1"/>
    <text x="22" y="382" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="15" fill="#333">开发者</text>
    <text x="320" y="382" font-family="'Segoe UI', sans-serif" font-size="14" fill="#888" text-anchor="end">WebhookSender Team</text>

    <!-- Save Button -->
    <rect x="16" y="500" width="324" height="52" rx="12" fill="#4CAF50"/>
    <text x="178" y="532" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="17" font-weight="700" text-anchor="middle" fill="white">💾 保存设置</text>
  </svg>

  <!-- Bottom app bar safe area -->
  <rect x="37" y="1761" width="356" height="32" rx="0" fill="white"/>

  <!-- Labels under phones -->
  <text x="215" y="870" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#333">发送消息页</text>
  <text x="635" y="870" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#333">发送历史页</text>
  <text x="215" y="1840" font-family="'Segoe UI', 'PingFang SC', sans-serif" font-size="16" font-weight="700" text-anchor="middle" fill="#333">设置页</text>
</svg>
